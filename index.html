<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Binh Global - Professional Strategic Consulting & Market Entry</title>
  <meta name="description"
    content="Binh Global specializes in strategic consulting for enterprises expanding across Canada, USA, and Southeast Asia. Expert advice on e-commerce, tech, and global logistics." />
  <meta name="keywords"
    content="Global Consulting, Market Entry, Canada Strategy, Southeast Asia Expansion, E-commerce Consulting, Binh Global, Strategic Advice" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://binhglobal.com/" />
  <meta property="og:title" content="Binh Global - Professional Strategic Consulting" />
  <meta property="og:description"
    content="Expert strategic consulting for global market expansion in North America and Southeast Asia." />
  <meta property="og:image" content="https://binhglobal.com/promo-banner.png" />

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:url" content="https://binhglobal.com/" />
  <meta property="twitter:title" content="Binh Global - Professional Strategic Consulting" />
  <meta property="twitter:description"
    content="Expert strategic consulting for global market expansion in North America and Southeast Asia." />
  <meta property="twitter:image" content="https://binhglobal.com/promo-banner.png" />

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Manrope', 'sans-serif'],
          },
          colors: {
            primary: "#059669", // Professional Forest Green
            "primary-dark": "#047857",
            background: "#ffffff",
            surface: "#f8fafc",
          },
          animation: {
            'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
          }
        }
      }
    }
  </script>
  <style>
    body {
      background-color: #ffffff;
      color: #0f172a;
    }

    .glass-panel {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(0, 0, 0, 0.05);
    }

    /* Custom scrollbar for chat */
    .scrollbar-thin::-webkit-scrollbar {
      width: 6px;
    }

    .scrollbar-thin::-webkit-scrollbar-track {
      background: transparent;
    }

    .scrollbar-thin::-webkit-scrollbar-thumb {
      background-color: rgba(0, 0, 0, 0.1);
      border-radius: 20px;
    }
  </style>
  <!-- Removing global index.css if not present, keeping inline styles for reliability -->
</head>

<body>
  <div id="root"></div>
  <script type="module" src="./index.tsx"></script>
</body>

</html>
